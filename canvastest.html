<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="submit" onclick="submit()"  >submit</button>
    <button id="reset" onclick="reset()"></button>
    <canvas id="myCanvas" width="800" height="600" style="border: 2mm solid black;"></canvas>
     <script>
        function reset() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(200, 1);
        ctx.lineTo(200,600 );
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(400, 1);
        ctx.lineTo(400,600 );
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(600, 1);
        ctx.lineTo(600,600 );
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(1, 200);
        ctx.lineTo(800,200 );
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(1, 400);
        ctx.lineTo(800,400 );
        ctx.stroke();
        function submit() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.moveTo(200, 1);
            ctx.lineTo(200,600 );
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(400, 1);
            ctx.lineTo(400,600 );
            ctx.stroke();
            ctx.beginPath();

            const x = document.getElementById('X').value;
            const y = document.getElementById('Y').value;
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
        } 
     </script>
     <input placeholder="X value" id="X" type="number">
     <input placeholder="Y value" id="Y" type="number">

</body>
</html>
